<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <title>SureVision AI — Starting</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #030712;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    /* Ambient glow background */
    .bg-glow {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
      animation: drift 8s ease-in-out infinite alternate;
    }
    .bg-glow.emerald { background: #34d399; top: -150px; left: -100px; }
    .bg-glow.cyan    { background: #22d3ee; bottom: -200px; right: -100px; animation-delay: -4s; }
    .bg-glow.purple  { background: #a78bfa; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -2s; opacity: 0.08; }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -20px) scale(1.1); }
    }

    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding: 40px;
    }

    /* Logo */
    .logo-wrap {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .logo-ring {
      position: absolute;
      inset: -8px;
      border-radius: 24px;
      border: 2px solid transparent;
      border-image: linear-gradient(135deg, #34d399, #22d3ee, #a78bfa) 1;
      animation: spin-ring 3s linear infinite;
    }

    @keyframes spin-ring {
      0%   { transform: rotate(0deg); opacity: 0.6; }
      50%  { opacity: 1; }
      100% { transform: rotate(360deg); opacity: 0.6; }
    }

    .logo-box {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(52, 211, 153, 0.15), rgba(34, 211, 238, 0.1));
      border: 1px solid rgba(52, 211, 153, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 40px rgba(52, 211, 153, 0.1), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .logo-gem {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, #6ee7b7, #67e8f9, #c4b5fd);
      animation: gem-pulse 2s ease-in-out infinite;
    }

    @keyframes gem-pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(52, 211, 153, 0.3); }
      50%      { transform: scale(1.08); box-shadow: 0 0 30px rgba(52, 211, 153, 0.5); }
    }

    /* Title */
    .title {
      font-size: 28px;
      font-weight: 600;
      background: linear-gradient(135deg, #f1f5f9, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 13px;
      color: #64748b;
      margin-top: -20px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Progress section */
    .progress-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 320px;
    }

    .progress-track {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 30%;
      border-radius: 4px;
      background: linear-gradient(90deg, #34d399, #22d3ee);
      animation: progress-move 2s ease-in-out infinite;
    }

    @keyframes progress-move {
      0%   { width: 5%;  margin-left: 0; }
      50%  { width: 40%; margin-left: 30%; }
      100% { width: 5%;  margin-left: 95%; }
    }

    .status-text {
      font-size: 13px;
      color: #94a3b8;
      transition: opacity 0.3s;
    }

    /* Service status items */
    .services {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 280px;
    }

    .svc {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      font-size: 13px;
      color: #94a3b8;
      transition: all 0.4s ease;
    }

    .svc.ready {
      border-color: rgba(52, 211, 153, 0.3);
      background: rgba(52, 211, 153, 0.05);
      color: #6ee7b7;
    }

    .svc-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #475569;
      flex-shrink: 0;
      transition: all 0.4s ease;
    }

    .svc.ready .svc-dot {
      background: #34d399;
      box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
    }

    .svc:not(.ready) .svc-dot {
      animation: dot-blink 1.2s ease-in-out infinite;
    }

    @keyframes dot-blink {
      0%, 100% { opacity: 0.4; }
      50%      { opacity: 1; }
    }

    .svc-label { flex: 1; }

    .svc-status {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 16px;
      font-size: 11px;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="bg-glow emerald"></div>
  <div class="bg-glow cyan"></div>
  <div class="bg-glow purple"></div>

  <div class="container">
    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <div class="logo-box">
        <div class="logo-gem"></div>
      </div>
    </div>

    <h1 class="title">SureVision AI</h1>
    <p class="subtitle">Enterprise Decision Intelligence</p>

    <div class="progress-section">
      <div class="progress-track">
        <div class="progress-bar"></div>
      </div>
      <p class="status-text" id="statusText">Initializing services...</p>
    </div>

    <div class="services">
      <div class="svc" id="svc-backend">
        <div class="svc-dot"></div>
        <span class="svc-label">Backend API</span>
        <span class="svc-status">starting</span>
      </div>
      <div class="svc" id="svc-frontend">
        <div class="svc-dot"></div>
        <span class="svc-label">Frontend App</span>
        <span class="svc-status">starting</span>
      </div>
    </div>
  </div>

  <div class="footer">© 2026 SureVision AI</div>

  <script>
    // Listen for status updates from the main process
    if (window.splashAPI) {
      window.splashAPI.onStatus((data) => {
        const el = document.getElementById('statusText');
        if (el && data.message) el.textContent = data.message;

        if (data.backendReady) {
          const svc = document.getElementById('svc-backend');
          if (svc) {
            svc.classList.add('ready');
            svc.querySelector('.svc-status').textContent = 'ready';
          }
        }
        if (data.frontendReady) {
          const svc = document.getElementById('svc-frontend');
          if (svc) {
            svc.classList.add('ready');
            svc.querySelector('.svc-status').textContent = 'ready';
          }
        }
      });
    }
  </script>
</body>
</html>
