services:
  mongo:
    image: mongo:7
    container_name: surevision-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  ai-engine:
    build:
      context: ./ai-engine
    container_name: surevision-ai-engine
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      PORT: 8000
    ports:
      - "8000:8000"

  backend:
    build:
      context: ./backend
    container_name: surevision-backend
    restart: unless-stopped
    depends_on:
      - mongo
      - ai-engine
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/surevision-ai
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-replace-with-a-long-refresh-secret}
      SETTINGS_ENCRYPTION_SECRET: ${SETTINGS_ENCRYPTION_SECRET:-replace-with-a-long-encryption-secret}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-SureVision AI <reports@surevision.ai>}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      AI_ENGINE_URL: http://ai-engine:8000
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
    container_name: surevision-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"

volumes:
  mongo-data:
